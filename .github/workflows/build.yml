name: Build & Package

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}
      
      - name: Build for multiple platforms
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/globiguard-linux-amd64 ./cmd || go build -o dist/globiguard-linux-amd64 .
          GOOS=darwin GOARCH=amd64 go build -o dist/globiguard-darwin-amd64 ./cmd || go build -o dist/globiguard-darwin-amd64 .
          GOOS=windows GOARCH=amd64 go build -o dist/globiguard-windows-amd64.exe ./cmd || go build -o dist/globiguard-windows-amd64.exe .
      
      - name: Verify build artifacts
        run: |
          ls -lh dist/
          file dist/globiguard-* || true
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: go-dist-go${{ matrix.go-version }}
          path: dist/
          retention-days: 5
